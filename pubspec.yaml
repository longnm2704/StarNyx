name: starnyx
description: "A privacy-first offline habit tracker with a constellation-inspired journal and check-in experience."
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  uuid: ^4.5.3
  intl: ^0.20.2
  drift: ^2.32.1
  get_it: ^9.2.1
  timezone: ^0.11.0
  equatable: ^2.0.8
  share_plus: ^12.0.2
  flutter_svg: ^2.2.1
  file_picker: ^11.0.2
  flutter_bloc: ^9.1.1
  path_provider: ^2.1.5
  cupertino_icons: ^1.0.8
  easy_localization: ^3.0.8
  flutter_colorpicker: ^1.1.0
  sqlite3_flutter_libs: ^0.6.0+eol
  flutter_local_notifications: ^21.0.0
  package_info_plus: ^9.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.5
  shared_preferences: ^2.5.3
  drift_dev: ^2.32.1
  build_runner: ^2.13.1
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/translations/
